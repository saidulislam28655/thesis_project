<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .time-display {
            font-size: 2.5em;
            color: #00ff88;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 0.95em;
            color: #e0e0e0;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .add-timezone-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-top: 20px;
        }

        .add-timezone-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        select, input {
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 1em;
        }

        select::placeholder, input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        select option {
            background: #333;
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2em;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Global Time Zone Clock</h1>

        <div class="controls">
            <button class="btn" onclick="addDefaultTimezones()">Reset to Defaults</button>
            <button class="btn" onclick="clearAllTimezones()">Clear All</button>
            <button class="btn" onclick="toggle24HourFormat()">Toggle Format (24h)</button>
        </div>

        <div class="clock-grid" id="clockGrid"></div>

        <div class="add-timezone-section">
            <h3>Add Custom Timezone</h3>
            <div class="input-group">
                <select id="timezoneSelect">
                    <option value="">Select a timezone...</option>
                </select>
                <input type="text" id="customLabel" placeholder="Custom label (optional)">
                <button class="btn" onclick="addTimezone()">Add</button>
            </div>
        </div>
    </div>

    <script>
        const timezones = [
            { name: 'New York', tz: 'America/New_York' },
            { name: 'London', tz: 'Europe/London' },
            { name: 'Tokyo', tz: 'Asia/Tokyo' },
            { name: 'Sydney', tz: 'Australia/Sydney' },
            { name: 'Dubai', tz: 'Asia/Dubai' }
        ];

        let customTimezones = [];
        let use24HourFormat = true;

        const allTimezones = [
            'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
            'America/Anchorage', 'Pacific/Honolulu',
            'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow',
            'Asia/Dubai', 'Asia/Kolkata', 'Asia/Bangkok', 'Asia/Singapore', 'Asia/Hong_Kong',
            'Asia/Shanghai', 'Asia/Tokyo', 'Australia/Sydney', 'Australia/Melbourne',
            'Pacific/Auckland', 'Pacific/Fiji',
            'Africa/Cairo', 'Africa/Johannesburg', 'America/Sao_Paulo', 'America/Buenos_Aires'
        ];

        function initializeTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            allTimezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz;
                option.textContent = tz;
                select.appendChild(option);
            });
        }

        function addTimezone() {
            const select = document.getElementById('timezoneSelect');
            const label = document.getElementById('customLabel');
            const tz = select.value;
            const customLabel = label.value.trim() || tz.split('/')[1];

            if (!tz) {
                alert('Please select a timezone');
                return;
            }

            if (!customTimezones.find(t => t.tz === tz)) {
                customTimezones.push({ name: customLabel, tz: tz });
                label.value = '';
                select.value = '';
                updateClocks();
            } else {
                alert('This timezone is already added');
            }
        }

        function removeTimezone(tz) {
            customTimezones = customTimezones.filter(t => t.tz !== tz);
            updateClocks();
        }

        function addDefaultTimezones() {
            customTimezones = [...timezones];
            updateClocks();
        }

        function clearAllTimezones() {
            customTimezones = [];
            updateClocks();
        }

        function toggle24HourFormat() {
            use24HourFormat = !use24HourFormat;
            updateClocks();
        }

        function formatTime(date, use24Hour) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            if (use24Hour) {
                return `${hours}:${minutes}:${seconds}`;
            } else {
                const hour12 = date.getHours() % 12 || 12;
                const ampm = date.getHours() >= 12 ? 'PM' : 'AM';
                return `${String(hour12).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
            }
        }

        function getDateString(date) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function updateClocks() {
            const grid = document.getElementById('clockGrid');
            grid.innerHTML = '';

            if (customTimezones.length === 0) {
                grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">No timezones added. Click "Reset to Defaults" to get started!</p>';
                return;
            }

            customTimezones.forEach(tz => {
                const date = new Date(new Date().toLocaleString('en-US', { timeZone: tz.tz }));
                const timeStr = formatTime(date, use24HourFormat);
                const dateStr = getDateString(date);

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-name">${tz.name}</div>
                    <div class="time-display">${timeStr}</div>
                    <div class="date-display">${dateStr}</div>
                    <button class="btn" style="width: 100%; margin-top: 15px; font-size: 0.85em;" onclick="removeTimezone('${tz.tz}')">Remove</button>
                `;
                grid.appendChild(card);
            });
        }

        function tick() {
            updateClocks();
        }

        // Initialize
        initializeTimezoneSelect();
        addDefaultTimezones();
        setInterval(tick, 1000);
    </script>
</body>
</html>
